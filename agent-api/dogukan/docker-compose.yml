version: '3.8'

services:
  # DynamoDB Local - Database Service
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: medicallm-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - medicallm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service
  backend:
    build:
      context: ./medicallm-backend
      dockerfile: Dockerfile
    container_name: medicallm-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - USE_LOCAL_DYNAMODB=true
      - DYNAMODB_LOCAL_ENDPOINT=http://dynamodb:8000
      - USERS_TABLE=medicallm-users
      - VERIFICATION_TABLE=medicallm-verifications
    depends_on:
      dynamodb:
        condition: service_healthy
    networks:
      - medicallm-network
    volumes:
      - ./medicallm-backend:/app
      - /app/node_modules
    command: npm run dev

  # Frontend Service (Optional - For Development)
  frontend:
    build:
      context: ./medicallm-frontend
      dockerfile: Dockerfile
    container_name: medicallm-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - backend
    networks:
      - medicallm-network
    volumes:
      - ./medicallm-frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

networks:
  medicallm-network:
    driver: bridge

