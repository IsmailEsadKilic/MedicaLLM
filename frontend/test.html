<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Drug API Test</h1>
    <input id="query" type="text" value="What is Warfarin?" style="width: 300px">
    <button onclick="testAPI()">Send</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const query = document.getElementById('query').value;
            const token = localStorage.getItem('token');
            
            document.getElementById('result').textContent = 'Sending...';
            
            try {
                const response = await fetch('http://localhost:3001/api/drugs/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                document.getElementById('result').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
