services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=medicallm
      - POSTGRES_PASSWORD=medicallm
      - POSTGRES_DB=drugbank
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medicallm -d drugbank"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_URL=postgresql://medicallm:medicallm@postgres:5432/drugbank
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:latest}
      - HGF_EMBEDDING_MODEL_ID=${HGF_EMBEDDING_MODEL_ID:-nomic-ai/nomic-embed-text-v1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_NAME=${APP_NAME:-MedicaLLM}
    volumes:
      - ./backend/data:/app/data
      - ./backend/chromadb-data:/app/chromadb-data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_HTTPS: ${VITE_USE_HTTPS:-false}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  postgres-data:

networks:
  internal:
    driver: bridge
