services:

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Database (DigitalOcean Managed PostgreSQL)
      - POSTGRES_URL=${POSTGRES_URL}
      # Auth
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      # LLM (DigitalOcean AI)
      - MODEL_ACCESS_KEY=${MODEL_ACCESS_KEY}
      - DO_AI_MODEL=${DO_AI_MODEL:-openai-gpt-oss-20b}
      # Embeddings
      - HGF_EMBEDDING_MODEL_ID=${HGF_EMBEDDING_MODEL_ID:-nomic-ai/nomic-embed-text-v1}
      - HF_TOKEN=${HF_TOKEN:-}
      # PubMed / Scopus
      - SCOPUS_API_KEY=${SCOPUS_API_KEY:-}
      # Admin
      - ADMIN_USERNAME=${ADMIN_USERNAME:-medicallm}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_NAME=${APP_NAME:-MedicaLLM}
    volumes:
      - ./backend/data:/app/data
      - ./backend/chromadb-data:/app/chromadb-data
    networks:
      - internal
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_USE_HTTPS: ${VITE_USE_HTTPS:-false}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  internal:
    driver: bridge
