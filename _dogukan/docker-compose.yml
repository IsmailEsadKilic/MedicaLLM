version: '3.8'

services:
  # DynamoDB Local - Database Service
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: medicallm-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    networks:
      - medicallm-network
    healthcheck:
      test: ["CMD-SHELL", "echo 'Health check' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./medicallm-backend
      dockerfile: Dockerfile
    container_name: medicallm-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - USE_LOCAL_DYNAMODB=true
      - DYNAMODB_LOCAL_ENDPOINT=http://dynamodb:8000
      - USERS_TABLE=medicallm-users
      - VERIFICATION_TABLE=medicallm-verifications
    depends_on:
      dynamodb:
        condition: service_healthy
    networks:
      - medicallm-network
    volumes:
      - ./medicallm-backend:/app
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./medicallm-frontend
      dockerfile: Dockerfile
    container_name: medicallm-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - AUTH_SECRET=${AUTH_SECRET:-your-secret-key-change-this}
      - NEXTAUTH_URL=http://localhost:3000
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
      - USE_LOCAL_DYNAMODB=true
      - DYNAMODB_LOCAL_ENDPOINT=http://dynamodb:8000
      - USERS_TABLE=medicallm-users
      - VERIFICATION_TABLE=medicallm-verifications
    depends_on:
      - backend
      - dynamodb
    networks:
      - medicallm-network
    volumes:
      - ./medicallm-frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm run dev -- -H 0.0.0.0"
    restart: unless-stopped

networks:
  medicallm-network:
    driver: bridge

