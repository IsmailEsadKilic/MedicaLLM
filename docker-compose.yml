version: '3.8'
services:
  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - ./dynamodb-data:/data

  # Data loader service (run once to load data)
  data-loader:
    image: python:3.11
    container_name: dynamodb-loader
    depends_on:
      - dynamodb-local
    volumes:
      - .:/app
    working_dir: /app
    command: |
      sh -c '
        echo "Installing dependencies..."
        pip install boto3 --quiet
        echo "Waiting for DynamoDB..."
        sleep 5
        echo "Creating tables and loading data..."
        python3 scripts/create_conversations_table.py
        python3 scripts/load_drugs_table.py
        python3 scripts/load_to_dynamodb.py
        echo "All data loaded successfully!"
      '
    profiles:
      - setup
