version: '3.8'
services:
  dynamodb-local:
    image: amazon/dynamodb-local
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /data"
    volumes:
      - ./dynamodb-data:/data
    networks:
      - medicallm-network

  # agent-api:
  #   build:
  #     context: ./agent-api
  #     dockerfile: Dockerfile
  #   container_name: agent-api
  #   ports:
  #     - "2580:2580"
  #   environment:
  #     - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
  #     - AWS_REGION=us-east-1
  #     - AWS_ACCESS_KEY_ID=test
  #     - AWS_SECRET_ACCESS_KEY=test
  #     - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
  #   volumes:
  #     - ./agent-api/chroma_db:/app/chroma_db
  #     - ./agent-api/data:/app/data
  #   depends_on:
  #     - dynamodb-local
  #   networks:
  #     - medicallm-network
  #   restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # - AGENT_API_URL=http://agent-api:2580
      - AGENT_API_URL=http://host.docker.internal:2580
      - DYNAMODB_ENDPOINT=http://dynamodb-local:8000
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - USERS_TABLE=Users
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    depends_on:
      - dynamodb-local
      # - agent-api
    networks:
      - medicallm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://backend:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - medicallm-network
    restart: unless-stopped

networks:
  medicallm-network:
    driver: bridge